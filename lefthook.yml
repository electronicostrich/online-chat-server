# Lefthook configuration — pre-commit / pre-push / commit-msg hooks.
# See docs/hooks.md §4 for the full reference and docs/git-workflow.md §5 for the etiquette contract.
#
# Installation: `pnpm install` runs `lefthook install` via the root package.json prepare script.
# Testing: `lefthook run pre-commit --all-files` or `lefthook run pre-commit --force`.
# Bypass (almost never): set HOOKS_SKIP_<HOOK>=1 — see docs/hooks.md §5.

min_version: 1.10.0

# ---------------------------------------------------------------------------
# pre-commit — runs on every `git commit`, operates on staged files only.
# Parallel by default; total budget ~3 seconds at MVP repo size.
# ---------------------------------------------------------------------------
pre-commit:
  parallel: true
  commands:

    typecheck-staged:
      # If any .ts/.tsx file is staged, run a full incremental typecheck.
      # We don't typecheck only the staged files because TS project references need the full graph.
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
      skip:
        - ref: HOOKS_SKIP_TYPECHECK_STAGED

    lint-staged:
      # ESLint on staged files only. --no-inline-config disables file-level eslint-disable
      # so a session cannot silently weaken rules by adding a comment to the top of a file.
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: pnpm eslint --max-warnings=0 --no-inline-config {staged_files}
      skip:
        - ref: HOOKS_SKIP_LINT_STAGED

    gitleaks:
      # Secret scanning. Requires `gitleaks` installed locally (brew install gitleaks).
      # --redact ensures the secret itself is never printed to the terminal.
      run: gitleaks protect --staged --redact --no-banner
      skip:
        - ref: HOOKS_SKIP_GITLEAKS

    drizzle-guard:
      # If any file under apps/api/src/db/schema/** is staged, require a matching migration
      # file and a docs/data-model.md edit to be staged too.
      glob: "apps/api/src/db/schema/**/*.ts"
      run: pnpm dlx tsx scripts/drizzle-guard.ts --staged
      skip:
        - ref: HOOKS_SKIP_DRIZZLE_GUARD

    suppression-check:
      # Reject new eslint-disable / @ts-expect-error / as any on net-new lines without issue link.
      # See docs/script-specs.md §7 for the algorithm.
      run: pnpm dlx tsx scripts/check-suppressions.ts --staged
      skip:
        - ref: HOOKS_SKIP_SUPPRESSION_CHECK

    ac-test-presence:
      # Branch name is feature/AC-XXX-... → require a staged e2e/specs/AC-XXX-*.spec.ts.
      # See docs/ai-development-guardrails.md §3 (test-first preference) and §4 (PR conventions).
      run: pnpm dlx tsx scripts/ac-test-presence.ts --staged
      skip:
        - ref: HOOKS_SKIP_AC_TEST_PRESENCE

# ---------------------------------------------------------------------------
# pre-push — runs on every `git push`. Stricter than pre-commit.
# ---------------------------------------------------------------------------
pre-push:
  parallel: false  # integration tests depend on DB state; do not parallelise with doc checks
  commands:

    integration-smoke:
      # A curated subset of integration tests that exercises the critical paths.
      # Full integration suite runs in CI; this is the fast local gate (<30s).
      run: pnpm test:smoke
      skip:
        - ref: HOOKS_SKIP_INTEGRATION_SMOKE

    doc-consistency:
      # Full doc-coverage check (see docs/script-specs.md §3).
      run: pnpm doc-consistency
      skip:
        - ref: HOOKS_SKIP_DOC_CONSISTENCY

# ---------------------------------------------------------------------------
# commit-msg — runs on every commit after the message is written.
# ---------------------------------------------------------------------------
commit-msg:
  commands:

    title-format:
      # Commit subject must match the type-prefix grammar from docs/git-workflow.md §4.1.
      # Types: AC-<ID>, chore, fix, doc, infra, spike.
      run: |
        SUBJECT=$(head -n 1 "{1}")
        if ! echo "$SUBJECT" | grep -qE '^(AC-[A-Z]+-[0-9]+|chore|fix|doc|infra|spike):[[:space:]]+.+$'; then
          echo "ERROR: commit subject must start with one of: AC-<ID>:, chore:, fix:, doc:, infra:, spike:"
          echo "       followed by a space and a short imperative summary."
          echo ""
          echo "Got: $SUBJECT"
          echo ""
          echo "Examples:"
          echo "  AC-AUTH-03: establish session on successful login"
          echo "  chore: bump @fastify/swagger to 9.0.0"
          echo "  fix: race condition when session revoked mid-request"
          echo ""
          echo "See docs/git-workflow.md §4.1 for the full spec."
          exit 1
        fi

    no-ai-footer:
      # Per the PO's global CLAUDE.md rule: no "Generated by Claude" / "Co-Authored-By: Claude" footers.
      run: |
        if grep -qiE '(generated by claude|co-authored-by:[[:space:]]*claude)' "{1}"; then
          echo "ERROR: commit message must not contain 'Generated by Claude' or 'Co-Authored-By: Claude'."
          echo "See docs/git-workflow.md §4.3 and the user's global CLAUDE.md."
          exit 1
        fi
