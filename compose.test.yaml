# Test-mode overrides. Used by e2e/support/global-setup.ts and by CI. Layers on
# top of compose.yaml and flips the api service to NODE_ENV=test so the
# /__test/seed route is registered per docs/testing-strategy.md §4.3.
#
# Usage: $CONTAINER_CLI compose -f compose.yaml -f compose.test.yaml up -d --wait
#
# Default dev compose (compose.yaml alone) keeps NODE_ENV=development and the
# /__test/seed route returns 404 — that negative-case check lives in the unit
# test suite at apps/api/test/unit/plugins/test-seed.test.ts.

services:
  api:
    environment:
      NODE_ENV: test
      # AC-PRES-02 / AC-PRES-04: compress the presence timing so
      # Playwright can assert AFK / stale transitions in the low
      # seconds without blocking the test suite on the product's
      # 60s / 45s real-time defaults (state-model.md §18).
      WEBSOCKET_AFK_THRESHOLD_MS: "1500"
      WEBSOCKET_STALE_TIMEOUT_MS: "2500"
      WEBSOCKET_PRESENCE_SCAN_INTERVAL_MS: "250"
